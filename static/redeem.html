  // ── Minimal bech32 LNURL decoder ─────────────────────────────────────────
  function decodeLNURL(lnurl) {
    const CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
    const str = lnurl.toLowerCase();
    const sep = str.lastIndexOf('1');
    const data5 = str.slice(sep + 1, -6).split('').map(c => CHARSET.indexOf(c));
    let acc = 0, bits = 0;
    const bytes = [];
    for (const v of data5) {
      acc = (acc << 5) | v;
      bits += 5;
      while (bits >= 8) { bits -= 8; bytes.push((acc >> bits) & 0xff); }
    }
    return new TextDecoder().decode(new Uint8Array(bytes));
  }

  // ── Fetch status then branch ──────────────────────────────────────────────

      const decoded = decodeLNURL(lnurl);

    } catch {
      showInvalid();
      return;
    }

      <!-- Amount -->
      <div class="redeem-amount">
        <div class="redeem-sats">⚡ ${satsFormatted} sats <button id="btn-sats-info" style="background:none;border:1px solid var(--text-muted);border-radius:50%;width:18px;height:18px;font-size:0.7rem;color:var(--text-muted);cursor:pointer;line-height:1;padding:0;vertical-align:middle;margin-left:4px;" aria-label="What are sats?">?</button></div>
        <div class="redeem-fiat" id="redeem-fiat-value"></div>
      </div>

      <!-- Expiry bar -->
      <div class="voucher-info-bar" ${hasExpiry ? '' : 'style="display:none;"'}>
        <span class="expiry" id="expiry-countdown"></span>
      </div>

      <!-- Claim card -->
      <div class="card" style="text-align:center;">
        <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px;">Tap the QR code to open your Bitcoin wallet</p>

        <div class="qr-wrapper" style="padding:0 0 4px;">
          <div id="redeem-qr-container" class="qr-container"></div>
          <p id="redeem-lnurl-text" class="qr-lnurl" style="margin-top:8px;"></p>
        </div>
      </div>

      ${buildInfoCard('wallet')}
    `;

    // Render QR
    const container = document.getElementById('redeem-qr-container');
    new QRCode(container, { text: lnurl, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.M });
    container.style.cursor = 'pointer';
    container.title = 'Tap to open in wallet';
    container.addEventListener('click', () => { window.location.href = 'lightning:' + lnurl; });

    // Show truncated LNURL — tap to copy
    const lnurlEl = document.getElementById('redeem-lnurl-text');
    const truncated = lnurl.slice(0, 20) + '…' + lnurl.slice(-6);
    lnurlEl.textContent = truncated;
    lnurlEl.style.cursor = 'pointer';
    lnurlEl.title = 'Tap to copy';
    lnurlEl.addEventListener('click', async function () {
      try {
        await navigator.clipboard.writeText(lnurl);
        lnurlEl.textContent = 'Copied!';
        setTimeout(() => { lnurlEl.textContent = truncated; }, 1500);
      } catch {
        prompt('Copy this LNURL:', lnurl);
      }
    });

    document.getElementById('btn-sats-info').addEventListener('click', function () {
      document.getElementById('sats-info-modal').classList.remove('hidden');
    });
    document.getElementById('sats-info-close').addEventListener('click', function () {
      document.getElementById('sats-info-modal').classList.add('hidden');
    });
    document.getElementById('sats-info-modal').addEventListener('click', function (e) {
      if (e.target === this) this.classList.add('hidden');
    });

    // Expiry countdown
    if (hasExpiry) {
      const countdownEl = document.getElementById('expiry-countdown');
      function updateCountdown() {
        const secsLeft = expires_at - Math.floor(Date.now() / 1000);
        if (secsLeft <= 0) {
          countdownEl.textContent = 'Expired';
          countdownEl.style.color = 'var(--orange)';
          return;
        }
        const d = Math.floor(secsLeft / 86400);
        const h = Math.floor((secsLeft % 86400) / 3600);
        const m = Math.floor((secsLeft % 3600) / 60);
        const s = secsLeft % 60;
        const parts = [];
        if (d > 0) parts.push(d + 'd');
        parts.push(String(h).padStart(2, '0') + 'h');
        parts.push(String(m).padStart(2, '0') + 'm');
        parts.push(String(s).padStart(2, '0') + 's');
        countdownEl.textContent = '⏳ Expires in ' + parts.join(' ') + ' ⏳';
      }
      updateCountdown();
      setInterval(updateCountdown, 1000);
    }

    // ZAR fiat conversion (non-blocking, silently fails)
    (async function fetchFiat() {
      const fiatEl = document.getElementById('redeem-fiat-value');
      if (!fiatEl) return;
      try {
        const r = await fetch(
          'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=zar'
        );
        if (!r.ok) return;
        const data = await r.json();
        const zarPerBtc = data && data.bitcoin && data.bitcoin.zar;
        if (!zarPerBtc) return;
        const zarValue = (sats / 100000000) * zarPerBtc;
        if (zarValue < 0.01) return;
        fiatEl.textContent = '≈ R' + zarValue.toLocaleString('en-ZA', {
          minimumFractionDigits: 2, maximumFractionDigits: 2
        });
      } catch (e) { /* silently ignore */ }
    })();

    // ── Background polling — auto-transition when voucher is redeemed ──────
    const pollInterval = setInterval(async function () {
      try {
        const r = await fetch('/voucher/status/' + secret);
        if (!r.ok) return;
        const s = await r.json();
        if (s.active) return;
        clearInterval(pollInterval);
        if (s.refunded) {
          main.innerHTML = `
            <div class="state-card">
              <div class="state-icon">⏰</div>
              <div class="state-title">Voucher expired</div>
              <div class="state-desc">This voucher expired before it was redeemed.<br>Ask the sender for a new one.</div>
            </div>
            ${buildInfoCard(null)}`;
        } else {
          main.innerHTML = `
            <div class="state-card">
              <div class="state-icon">✅</div>
              <div class="state-title">Already claimed</div>
              <div class="state-desc">This voucher has already been redeemed.</div>
            </div>
            ${buildInfoCard('spend')}`;
        }
      } catch { /* silently ignore network errors */ }
    }, 12000);
  }

  init();

  // ── Wallet tab switching ──────────────────────────────────────────────────
  document.addEventListener('click', function (e) {
    const btn = e.target.closest('[data-tab]');
    if (!btn) return;
    const tabsEl = btn.closest('#wallet-tabs');
    if (!tabsEl) return;
    const card = tabsEl.closest('.card, .faq-answer');
    tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    card.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    const pane = card.querySelector('#tab-' + btn.dataset.tab);
    if (pane) pane.classList.add('active');
  });

})();
</script>
</body>
</html>
